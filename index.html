<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Пульт дня</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="theme-color" content="#6366F1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" />
  <link rel="stylesheet" href="styles.css?v=10" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-row topbar-main">
      <div class="topbar-left">
        <h1>Пульт дня</h1>
        <span class="topbar-date" id="date">—</span>
      </div>
      <div class="topbar-right">
        <div id="countdown" class="countdown" title="До конца дня (18:00)">--:--:--</div>
        <div id="clock" class="clock">--:--:--</div>
      </div>
    </div>
    <div class="topbar-row topbar-now">
      <span class="now-label">Сейчас</span>
      <span class="now-title" id="nowBlock">—</span>
      <span class="now-meta" id="nowMeta"></span>
      <div class="resume-widget" id="resumeWidget">
        <button id="resumeMinus" class="resume-step" type="button" aria-label="Убрать одно резюме">−</button>
        <button id="resumeCount" class="resume-pill" type="button" title="История откликов">Резюме <b id="resumeCountNum">0/10</b></button>
        <button id="resumePlus" class="resume-step resume-plus" type="button" aria-label="Добавить резюме">+</button>
        <button id="resumePip" class="resume-step resume-pip" type="button" title="Плавающее окно поверх всех окон" aria-label="Плавающее окно со счётчиком">⧉</button>
        <div class="resume-pop" id="resumePop" hidden>
          <div class="resume-pop-head">
            <span class="resume-pop-title">Отклики по дням</span>
            <label class="resume-goal">Цель в день <input id="resumeGoal" type="number" min="1" max="99" /></label>
          </div>
          <div class="resume-chart" id="resumeChart" aria-hidden="true"></div>
          <div class="resume-table-wrap">
            <table class="resume-table"><tbody id="resumeTableBody"></tbody></table>
          </div>
          <div class="resume-pop-foot">
            <span id="resumeWeek">за 7 дней: 0</span>
            <span id="resumeTotal">всего: 0</span>
          </div>
        </div>
      </div>
    </div>
  </header>
  <main>
    <section class="pomodoro" id="pomodoro" aria-label="Pomodoro">
      <div class="pomo-head">
        <span class="pomo-mode pomo-mode-work" id="pomoMode">Фокус</span>
        <span class="pomo-sprints" id="pomoSprints">Спринт 1 / 4</span>
      </div>
      <div class="pomo-ring-wrap">
        <svg class="pomo-ring" viewBox="0 0 240 240" aria-hidden="true">
          <circle class="pomo-ring-track" cx="120" cy="120" r="104" />
          <circle class="pomo-ring-fill"  cx="120" cy="120" r="104" id="pomoRing" />
        </svg>
        <div class="pomo-ring-center">
          <div class="pomo-time" id="pomoTime">25:00</div>
          <div class="pomo-time-meta" id="pomoTimeMeta">из 25:00</div>
        </div>
      </div>
      <div class="pomo-controls">
        <button id="pomoStart" class="pomo-btn pomo-btn-primary" type="button">Старт</button>
        <button id="pomoSkip"  class="pomo-btn" type="button">Пропуск</button>
        <button id="pomoReset" class="pomo-btn" type="button">Сброс</button>
        <button id="pomoPreset" class="pomo-btn pomo-btn-ghost" type="button">25 / 5</button>
      </div>
      <div class="pomo-sound">
        <button id="soundBtn" class="pomo-btn pomo-btn-ghost" type="button">Звук вкл</button>
        <select id="soundSelect" class="pomo-select" aria-label="Звук сигнала">
          <option value="bleep">Двойной бип</option>
          <option value="chime">Колокольчик</option>
          <option value="ding">Динь</option>
          <option value="triple">Тройной</option>
          <option value="low">Низкий</option>
          <option value="custom">Свой файл</option>
        </select>
        <label for="soundFile" class="pomo-btn pomo-btn-ghost" id="soundFileLabel">Загрузить…</label>
        <input id="soundFile" type="file" accept="audio/*" hidden />
        <button id="soundTest" class="pomo-btn pomo-btn-ghost" type="button">▶ тест</button>
        <button id="notifyBtn" class="pomo-btn pomo-btn-ghost" type="button">Уведомления</button>
      </div>
    </section>
    <section id="schedule" class="schedule" aria-label="Расписание"></section>
  </main>
  <script src="schedule.js?v=10"></script>
  <script src="app.js?v=10"></script>
</body>
</html>
